# DriftDraw CI — verifies the project on a GitLab runner: install, typecheck,
# test, and build. A green pipeline is the challenge's "runnable via git-runner"
# signal. Currently runs on a self-hosted shell runner (local Node); the
# `image` below is honored only by docker/shared runners. Vercel handles hosting
# separately — see DEPLOYMENT.md.

image: node:20

stages:
  - verify

verify:
  stage: verify
  script:
    # npm ci: strict, reproducible install straight from the committed
    # package-lock.json (fails fast if the lock and package.json drift apart).
    - npm ci
    - npm run typecheck
    - npm test
    # Confirm the Next.js app (page + API routes) actually compiles. Safe without
    # secrets: the game service is wired lazily (first request), never at build
    # time, so no API keys are read here. If Next ever tries to execute a route
    # at build, add `export const dynamic = 'force-dynamic'` to that route.
    - npm run build
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  rules:
    - if: $CI_COMMIT_BRANCH
